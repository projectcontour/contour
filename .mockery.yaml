template: testify
dir: "{{.InterfaceDir}}/mocks"
filename: "mock_{{.InterfaceName | snakecase}}.go"
pkgname: mocks
packages:
  github.com/projectcontour/contour/internal/debug:
    interfaces:
      DagBuilder: {}
  github.com/projectcontour/contour/internal/k8s:
    interfaces:
      StatusMetrics: {}
